global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sharetoken'
    cluster: 'devnet'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      timeout: 10s
      api_version: v2

# Rule files
rule_files:
  - "recording_rules.yml"
  - "alerting_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'sharetoken-node'

  # Cadvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'sharetoken-containers'

  # ShareToken Node Metrics
  - job_name: 'sharetoken-node'
    static_configs:
      - targets: ['sharetoken-exporter:26660']
        labels:
          instance: 'sharetoken-node-0'
          chain_id: 'sharetoken'
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 3s

  # CometBFT Metrics (if enabled on node)
  - job_name: 'cometbft'
    static_configs:
      - targets: []
        # - 'host.docker.internal:26660'
    metrics_path: /metrics
    scrape_interval: 5s

  # Application Metrics
  - job_name: 'sharetoken-app'
    static_configs:
      - targets: []
        # - 'host.docker.internal:1317'
    metrics_path: /metrics
    scrape_interval: 10s
