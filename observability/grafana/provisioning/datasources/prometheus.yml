apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 5s
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: 2.48.0
      cacheLevel: 'High'
      incrementalQuerying: true
      incrementalQuerySyncTimeout: 10

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      manageAlerts: false
      alertmanagerUid: ''
      derivedFields:
        - name: TraceID
          matcherRegex: 'trace_id=(\w+)'
          url: 'http://localhost:16686/trace/$${__value.raw}'
        - name: Node
          matcherRegex: 'node=([\w-]+)'
          url: ''
      maxLines: 1000
