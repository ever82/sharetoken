syntax = "proto3";
package sharetoken.taskmarket;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "sharetoken/x/taskmarket/types";

// TaskType represents the type of marketplace task
enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_OPEN = 1;
  TASK_TYPE_AUCTION = 2;
}

// TaskStatus represents the status of a marketplace task
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_DRAFT = 1;
  TASK_STATUS_OPEN = 2;
  TASK_STATUS_ASSIGNED = 3;
  TASK_STATUS_IN_PROGRESS = 4;
  TASK_STATUS_REVIEW = 5;
  TASK_STATUS_COMPLETED = 6;
  TASK_STATUS_CANCELLED = 7;
  TASK_STATUS_DISPUTED = 8;
}

// TaskCategory represents task categories
enum TaskCategory {
  TASK_CATEGORY_UNSPECIFIED = 0;
  TASK_CATEGORY_DEVELOPMENT = 1;
  TASK_CATEGORY_DESIGN = 2;
  TASK_CATEGORY_WRITING = 3;
  TASK_CATEGORY_RESEARCH = 4;
  TASK_CATEGORY_MARKETING = 5;
  TASK_CATEGORY_CONSULTING = 6;
  TASK_CATEGORY_OTHER = 7;
}

// Task represents a marketplace task
message Task {
  // id is the unique task identifier
  string id = 1;

  // title is the task title
  string title = 2;

  // description is the task description
  string description = 3;

  // requester_id is the address of the task requester
  string requester_id = 4;

  // worker_id is the address of the assigned worker (if any)
  string worker_id = 5;

  // task_type is the task type (open or auction)
  TaskType task_type = 6;

  // category is the task category
  TaskCategory category = 7;

  // status is the current task status
  TaskStatus status = 8;

  // budget is the task budget in STT
  uint64 budget = 9;

  // currency is the currency symbol (e.g., "STT", "USDC")
  string currency = 10;

  // deadline is the Unix timestamp deadline
  int64 deadline = 11;

  // skills are the required skills
  repeated string skills = 12;

  // subtasks are the decomposed subtasks
  repeated Subtask subtasks = 13 [(gogoproto.nullable) = false];

  // milestones are the task milestones
  repeated Milestone milestones = 14 [(gogoproto.nullable) = false];

  // created_at is the Unix timestamp of creation
  int64 created_at = 15;

  // updated_at is the Unix timestamp of last update
  int64 updated_at = 16;

  // assigned_at is the Unix timestamp of assignment
  int64 assigned_at = 17;

  // completed_at is the Unix timestamp of completion
  int64 completed_at = 18;

  // view_count is the number of views
  int32 view_count = 19;

  // application_count is the number of applications
  int32 application_count = 20;

  // bid_count is the number of bids
  int32 bid_count = 21;
}

// Subtask represents a decomposed subtask
message Subtask {
  // id is the unique subtask identifier
  string id = 1;

  // task_id is the parent task ID
  string task_id = 2;

  // title is the subtask title
  string title = 3;

  // description is the subtask description
  string description = 4;

  // order is the display order
  int32 order = 5;

  // budget is the subtask budget
  uint64 budget = 6;

  // completed indicates if the subtask is completed
  bool completed = 7;
}

// MilestoneStatus represents milestone status
enum MilestoneStatus {
  MILESTONE_STATUS_UNSPECIFIED = 0;
  MILESTONE_STATUS_PENDING = 1;
  MILESTONE_STATUS_ACTIVE = 2;
  MILESTONE_STATUS_SUBMITTED = 3;
  MILESTONE_STATUS_APPROVED = 4;
  MILESTONE_STATUS_REJECTED = 5;
  MILESTONE_STATUS_PAID = 6;
}

// Milestone represents a task milestone
message Milestone {
  // id is the unique milestone identifier
  string id = 1;

  // task_id is the parent task ID
  string task_id = 2;

  // title is the milestone title
  string title = 3;

  // description is the milestone description
  string description = 4;

  // amount is the milestone payment amount
  uint64 amount = 5;

  // order is the display order
  int32 order = 6;

  // status is the milestone status
  MilestoneStatus status = 7;

  // deliverables is the submitted deliverables
  string deliverables = 8;

  // created_at is the Unix timestamp of creation
  int64 created_at = 9;

  // completed_at is the Unix timestamp of completion
  int64 completed_at = 10;
}
