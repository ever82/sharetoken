syntax = "proto3";
package sharetoken.telemetry;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "sharetoken/telemetry/telemetry.proto";

option go_package = "sharetoken/x/telemetry/types";

// Msg defines the Msg service.
service Msg {
  // UpdateConfig updates the telemetry configuration
  rpc UpdateConfig(MsgUpdateConfig) returns (MsgUpdateConfigResponse);
}

// MsgUpdateConfig is the Msg/UpdateConfig request type.
message MsgUpdateConfig {
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the address that controls the telemetry module
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // config is the new telemetry configuration
  TelemetryConfig config = 2 [(gogoproto.nullable) = false];
}

// MsgUpdateConfigResponse is the Msg/UpdateConfig response type.
message MsgUpdateConfigResponse {}
