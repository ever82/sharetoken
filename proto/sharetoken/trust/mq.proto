syntax = "proto3";
package sharetoken.trust;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "sharetoken/x/trust/types";

// MQScore represents a user's Moral Quotient score
message MQScore {
  // address is the user address
  string address = 1;

  // score is the current MQ score (0-100)
  int32 score = 2;

  // disputes is the number of disputes participated
  uint64 disputes = 3;

  // consensus is the number of times voted with consensus
  uint64 consensus = 4;

  // updated_at is the Unix timestamp of last update
  int64 updated_at = 5;
}
