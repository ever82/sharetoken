name: Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Desktop App
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build ShareToken Binary
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          OUTPUT="bin/sharetokend"
          if [ "${{ matrix.platform }}" = "win" ]; then
            OUTPUT="bin/sharetokend.exe"
          fi
          export GOOS=${{ matrix.platform == 'win' && 'windows' || matrix.platform == 'mac' && 'darwin' || 'linux' }}
          export GOARCH=${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          go build -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT" -o "$OUTPUT" ./cmd/sharetokend
          file "bin/sharetokend*" || true
        shell: bash

      - name: Prepare ShareToken Node Data
        run: |
          # Create single-node configuration for desktop app
          mkdir -p desktop/node-data
          if [ "${{ matrix.platform }}" = "win" ]; then
            ./bin/sharetokend.exe init desktop-node --chain-id sharetoken-desktop --home desktop/node-data
            ./bin/sharetokend.exe keys add validator --keyring-backend test --home desktop/node-data
            VALIDATOR_ADDR=$(./bin/sharetokend.exe keys show validator -a --keyring-backend test --home desktop/node-data)
          else
            ./bin/sharetokend init desktop-node --chain-id sharetoken-desktop --home desktop/node-data
            ./bin/sharetokend keys add validator --keyring-backend test --home desktop/node-data
            VALIDATOR_ADDR=$(./bin/sharetokend keys show validator -a --keyring-backend test --home desktop/node-data)
          fi
          echo "Validator address: $VALIDATOR_ADDR"
          # Add genesis account and gentx (use stake instead of stt)
          if [ "${{ matrix.platform }}" = "win" ]; then
            ./bin/sharetokend.exe add-genesis-account $VALIDATOR_ADDR 100000000stake --home desktop/node-data
            ./bin/sharetokend.exe gentx validator 10000000stake --chain-id sharetoken-desktop --keyring-backend test --home desktop/node-data
            ./bin/sharetokend.exe collect-gentxs --home desktop/node-data
          else
            ./bin/sharetokend add-genesis-account $VALIDATOR_ADDR 100000000stake --home desktop/node-data
            ./bin/sharetokend gentx validator 10000000stake --chain-id sharetoken-desktop --keyring-backend test --home desktop/node-data
            ./bin/sharetokend collect-gentxs --home desktop/node-data
          fi
          echo "Node data prepared"
        shell: bash

      - name: Update extraResources with node data
        run: |
          # Add node-data to extraResources in package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('desktop/package.json', 'utf8'));
            if (!pkg.build.extraResources) pkg.build.extraResources = [];
            // Add node-data if not exists
            const hasNodeData = pkg.build.extraResources.some(r => r.to === 'node-data');
            if (!hasNodeData) {
              pkg.build.extraResources.push({
                from: '../desktop/node-data',
                to: 'node-data',
                filter: ['**/*']
              });
            }
            fs.writeFileSync('desktop/package.json', JSON.stringify(pkg, null, 2) + '\\n');
            console.log('Updated package.json with node-data');
          "
        shell: bash

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          ESLINT_NO_DEV_ERRORS=true npm run build
        shell: bash

      - name: Install Desktop Dependencies
        run: |
          cd desktop
          npm install
        shell: bash

      - name: Build Desktop (macOS)
        if: matrix.platform == 'mac'
        run: |
          cd desktop
          npm run build:mac
        shell: bash

      - name: Build Desktop (Windows)
        if: matrix.platform == 'win'
        run: |
          cd desktop
          npm run build:win
        shell: bash

      - name: Build Desktop (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd desktop
          npm run build:linux
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: desktop/dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List Artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: "ShareToken Desktop ${{ github.ref_name }}"
          body: |
            ## ShareToken Desktop 桌面应用 ${{ github.ref_name }}

            ### 下载安装

            **Windows (绿色版/便携版):**
            下载 `ShareToken-0.1.0-win-x64.zip`，解压后双击 `ShareToken.exe` 即可运行。

            **macOS:**
            - Intel: 下载 `ShareToken-0.1.0-mac-x64.dmg` 或 `.zip`
            - Apple Silicon: 下载 `ShareToken-0.1.0-mac-arm64.dmg` 或 `.zip`

            **Linux:**
            - AppImage: 下载 `ShareToken-0.1.0-linux-x86_64.AppImage`，双击运行
            - 或下载 `.tar.gz` 解压使用

            ### 功能特性

            - ✅ 开箱即用，无需安装 Node.js 或其他依赖
            - ✅ 内置轻量级区块链节点
            - ✅ 图形界面钱包（创建/导入/转账）
            - ✅ 服务市场浏览
            - ✅ AI 对话界面 (GenieBot)

            ### 系统要求

            - Windows 10/11 (64位)
            - macOS 10.15+ (Intel 或 Apple Silicon)
            - Ubuntu 20.04+ / Debian 10+ / CentOS 8+ (64位)
            - 4GB+ 内存
            - 2GB+ 磁盘空间

            ### 快速开始

            1. 下载对应系统的安装包
            2. 解压（Windows/Linux）或安装（macOS）
            3. 双击打开 ShareToken
            4. 等待本地节点启动（约 10-30 秒）
            5. 创建或导入钱包，开始使用！

            ---

            **Full Changelog**: https://github.com/ever82/sharetoken/commits/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
