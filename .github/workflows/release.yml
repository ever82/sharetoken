name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-amd64
            os: macos-latest
            goos: darwin
            goarch: amd64
            archive: sharetoken_darwin_amd64.tar.gz
          - target: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            archive: sharetoken_darwin_arm64.tar.gz
          - target: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            archive: sharetoken_linux_amd64.tar.gz
          - target: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            archive: sharetoken_linux_arm64.tar.gz
          - target: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            binary: sharetokend.exe
            archive: sharetoken_windows_amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (Unix)
        if: runner.os != 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT" -o sharetokend ./cmd/sharetokend

      - name: Build (Windows)
        if: runner.os == 'Windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          $Version = $env:GITHUB_REF -replace 'refs/tags/',''
          $Commit = git rev-parse --short HEAD
          go build -ldflags "-X main.Version=$Version -X main.Commit=$Commit" -o sharetokend.exe ./cmd/sharetokend

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive }} sharetokend

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path sharetokend.exe -DestinationPath ${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
