# golangci-lint 配置文件
# 用于 Go 代码质量检查
# 文档: https://golangci-lint.run/usage/configuration/

run:
  # 超时时间
  timeout: 5m
  # 模块下载模式
  modules-download-mode: readonly
  # 允许并行运行
  allow-parallel-runners: true
  # 排除目录
  skip-dirs:
    - vendor
    - bin
    - .devnet
  # Go 版本
  go: "1.19"

output:
  # 输出格式
  format: colored-line-number
  # 打印行号
  print-issued-lines: true
  # 打印 linter 名称
  print-linter-name: true

linters:
  # 启用的检查器
  enable:
    # 基础检查
    - gofmt        # 检查 gofmt 格式
    - govet        # Go 官方 vet 工具
    - errcheck     # 检查错误处理
    - staticcheck  # 静态分析检查
    - gosimple     # 简化代码建议
    - ineffassign  # 无效赋值检查

    # 代码风格
    - revive       # 取代 golint 的代码风格检查
    - stylecheck   # 风格检查
    - goimports    # import 排序检查
    - gci          # import 分组检查

    # 代码质量
    - unused       # 未使用代码检查

    # 安全与正确性
    - gosec        # 安全检查
    - prealloc     # 预分配建议
    - exportloopref # 循环引用导出检查

    # 性能
    - bodyclose    # HTTP body 关闭检查
    - noctx        # context 使用检查

  # 禁用的检查器
  disable:
    - maligned     # 已弃用，由 govet 替代
    - scopelint    # 已弃用
    - interfacer   # 已弃用
    - exhaustive   # 可能过于严格
    - deadcode     # 已弃用，由 unused 替代
    - structcheck  # 已弃用
    - varcheck     # 已弃用
    - golint       # 已弃用，由 revive 替代
    - typecheck    # 这不是一个 linter

linters-settings:
  # gofmt 设置
  gofmt:
    simplify: true

  # goimports 设置
  goimports:
    local-prefixes: sharetoken

  # gci 设置
  gci:
    sections:
      - standard
      - default
      - prefix(sharetoken)
    custom-order: true

  # govet 设置
  govet:
    enable-all: true
    disable:
      - shadow

  # errcheck 设置
  errcheck:
    check-type-assertions: true
    check-blank: true

  # revive 设置 (取代 golint)
  revive:
    confidence: 0.8

  # prealloc 设置
  prealloc:
    simple: true
    range-loops: true
    for-loops: false

  # staticcheck 设置
  staticcheck:
    go: "1.19"
    checks:
      - all

issues:
  # 排除某些路径
  exclude-rules:
    # 排除 vendor 目录
    - path: vendor/
      linters:
        - all

    # 排除生成的 protobuf 代码
    - path: ".*\\.pb\\.go$"
      linters:
        - gofmt
        - goimports
        - revive

    # 排除测试文件某些检查
    - path: _test\.go
      linters:
        - gosec
        - dupl

    # 允许某些常见模式
    - linters:
        - revive
      text: "should have comment"

    - linters:
        - stylecheck
      text: "ST1000"

  # 最大问题数
  max-issues-per-linter: 50
  max-same-issues: 10

  # 不显示排除规则
  exclude-use-default: false
